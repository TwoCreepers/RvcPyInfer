[project]
name = "rvcpyinfer"
version = "0.1.0"
description = "rvc 的 onnx 模型导出格式推理实现"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.3",
    "pyworld>=0.3.5",
    "samplerate>=0.2.4",
    "soundfile>=0.14.0",
]
authors = [
    { name = "观赏鱼" }
]

[project.scripts]
rvc-py-infer = "RvcPyInfer.__main__:main"
rvc-py-infer-test = "RvcPyInfer.__main__:test"

# 构建系统
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# 可选模块，方便调用
[project.optional-dependencies]
cpu = [
    "onnxruntime>=1.27.0",
]
dml = [
    "onnxruntime-directml>=1.24.4",
]
cuda = [
    "onnxruntime-gpu>=1.27.0",
]
openvino = [
    "openvino>=2026.2.1",
]
index = [
    "faiss-cpu>=1.14.3",
]

[tool.uv]
conflicts = [   # 这几个是互斥的，防止 uv 傻乎乎地全装上了
    [
        { extra = "cpu" },
        { extra = "cuda" },
        { extra = "dml" }
    ],
]
